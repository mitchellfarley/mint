name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: release v') }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install --upgrade pip build

      - name: Bump patch version in pyproject.toml
        id: bump
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          p = Path("pyproject.toml")
          txt = p.read_text()
          m = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', txt, flags=re.M)
          if not m:
              raise SystemExit("Could not find version line in pyproject.toml")
          maj, mn, pt = (int(x) for x in m.groups())
          new = f"{maj}.{mn}.{pt + 1}"
          txt2 = re.sub(
              r'^version\s*=\s*"\d+\.\d+\.\d+"',
              f'version = "{new}"',
              txt,
              count=1,
              flags=re.M,
          )
          p.write_text(txt2)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"new_version={new}\n")
              f.write(f"tag=v{new}\n")
          print(f"Bumped to {new}")
          PY

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: release v${{ steps.bump.outputs.new_version }}"

      - name: Push commit and tag
        run: |
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin main
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Build sdist and wheel
        run: python -m build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: v${{ steps.bump.outputs.new_version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
